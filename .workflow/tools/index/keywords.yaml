    description: "将代码变更提交到 Git 仓库"

  - tool_id: "grep"
    keywords: ["grep", "glob", "搜索", "搜索内容", "查找", "查找代码", "内容匹配", "找文件", "文件模式", "函数", "定义"]
    catalog: "catalog/grep.md"
    description: "搜索文件内容（Grep）或按模式查找文件（Glob）"

  - tool_id: "read"
    keywords: ["read", "读取文件", "查看文件", "文件内容", "读取状态", "读取配置"]
    catalog: "catalog/read.md"
    description: "读取文件内容"
