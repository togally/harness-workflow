tools:
  - tool_id: "agent"
    keywords: ["subagent", "agent", "派发任务", "独立视角", "测试", "验收", "诊断", "协调"]
    catalog: "catalog/agent.md"
    description: "启动 subagent 执行独立任务"

  - tool_id: "bash"
    keywords: ["bash", "执行命令", "运行", "运行脚本", "编译", "测试", "单元测试", "git", "mvn", "npm", "build"]
    catalog: "catalog/bash.md"
    description: "执行系统命令和脚本"

  - tool_id: "claude-code-context"
    keywords: ["compact", "clear", "上下文维护", "压缩", "压缩上下文", "清理", "清理上下文", "新开 agent", "handoff", "上下文过长", "太长"]
    catalog: "catalog/claude-code-context.md"
    description: "Claude Code 上下文维护命令（/compact、/clear、/new）"

  - tool_id: "edit"
    keywords: ["edit", "write", "编辑文件", "修改文件", "修改代码", "改代码", "代码", "替换内容", "创建文件", "新建文件"]
    catalog: "catalog/edit.md"
    description: "编辑或创建文件内容（Edit / Write）"

  - tool_id: "find-skills"
    keywords: ["skill", "skills", "skillhub", "查找技能", "发现工具", "扩展工具", "工具查询", "未命中"]
